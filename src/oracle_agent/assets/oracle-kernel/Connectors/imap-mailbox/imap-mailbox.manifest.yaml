# imap-mailbox -- the IMAP mailbox connector template (P7-T5). Pull-only.
#
# Copy this dir to Connectors/<id>/ (one dir per mailbox; the id MUST match the
# folder name) and fill in the host, folder allowlist, and auth var names. Pulls
# messages (text body + per-attachment files, each classified individually) from
# an admin-allowlisted set of IMAP folders (source.folders -- the default-deny
# scope allowlist) into Workproduct.nosync/_INPUT/ through the shared
# RemoteConnector safety core. Connects with stdlib imaplib.IMAP4_SSL using a
# default-verifying ssl context -- NEVER plain IMAP4, never optional STARTTLS
# (P7S-5). Folders are opened with EXAMINE (read-only) so flags are never mutated.
# Runtime: _tools/connectors/imap_mailbox.py (list_items + fetch_item only; pull
# is the FINAL core template).
#
# Block-style YAML only: one '- item' per line; no anchors, aliases, tags, flow
# ([] / {}), or multi-doc. Empty OPTIONAL fields are OMITTED (a bare 'key:'
# parses to null and the schema types these fields, so it would fail lint).
# Validated against _tools/schemas/connector.schema.json.

# id MUST match the folder name and the runtime's connector id. For a second
# mailbox use a distinct id (e.g. imap-mailbox-sales) -- it resolves to this
# class via the registry's system-fallback.
id: imap-mailbox

system: imap

# planned until the admin sets host + the folder allowlist + auth var names and
# generates an app password at the provider.
status: planned

# IMAP over certificate-verified IMAP4_SSL via stdlib imaplib (no urllib).
access_mode: api

# A point-in-time snapshot of the windowed mail is copied + ingested; re-run pull
# (UID cursor + since_days window) to refresh.
locality: external_only
capture_tier: snapshot

# auth: reference variable NAMES only -- never secret values. v1 auth is username
# + APP PASSWORD (consumer Gmail / O365 have retired basic auth except app
# passwords, and Google's device flow cannot grant the mail scope -- P7S-26).
# The app password lives in the root's .env.nosync (0600, never logged), written
# by the wizard via write_root_env_secret. ROTATION = re-run the wizard step
# (upsert). REVOCATION = remove the var AND revoke the app password at the
# provider (removing the var disables the connector here; the upstream app
# password stays valid until revoked there -- P7S-6).
auth:
  method: app_password
  vars:
    - IMAP_USERNAME
    - IMAP_APP_PASSWORD

# Read-only: the core refuses to run a read_write connector as a pull; the
# runtime opens folders with EXAMINE so flags are never mutated.
permissions: read_only

# Freshness SLA: a mail snapshot is considered stale after ~1 day; re-pull to
# refresh. Freshness is derived from the cursor's last_success_ts (a pull never
# rewrites this manifest; P7S-23). last_verified is omitted until the first pull.
freshness:
  class: api
  expected_decay_days: 1

# Source authority (feeds TRUTH-MAP.md): primary only for the messages inside the
# admin-allowlisted mailbox folders.
authoritative_for:
  - messages in the allowlisted IMAP folders
cannot_prove:
  - mail outside the allowlisted folders / window

# Guardrails.
forbidden_uses:
  - pulling a folder the admin has not added to source.folders
  - any write back to the mailbox (read-only; EXAMINE only)
  - connecting without certificate-verified TLS (no plain IMAP4 / STARTTLS)
biases:
  - reflects only the folders + since_days window the admin chose

# Health: confirm the host + folder allowlist are set, auth vars resolve, and the
# connector is read-only.
health_check:
  cadence: daily
  checks:
    - source.host is set and source.folders is a non-empty allowlist
    - IMAP_USERNAME / IMAP_APP_PASSWORD resolve in <root>/.env.nosync
    - last pull within freshness SLA

# No remote schema to re-probe (the grain is "messages in the allowlisted folders").
schema_refresh:
  enabled: false
  remote_probe: false

# Runtime-specific block (read by _tools/connectors/imap_mailbox.py). The schema's
# job here is shape/typo detection; EMPTINESS is enforced at pull time by the
# default-deny allowlist gate (None/missing/[]/non-list all refuse -- empty never
# means 'everything'; P7S-13). The IMAP host is the SOLE manifest-supplied
# endpoint (P7S-5) and requires certificate-verified IMAP4_SSL.
#   host                -- the IMAP server host (e.g. imap.gmail.com). The single
#                          manifest-supplied endpoint; verified IMAP4_SSL only.
#   folders             -- DEFAULT-DENY allowlist of folder names to pull.
#   since_days          -- only messages within this many days are windowed in.
#   max_files           -- blast-radius cap per pull (also bounded by actions caps).
#   default_sensitivity -- classification FLOOR. confidential for mail: it is
#                          presumptively sensitive and ambiguity classifies UP (I4).
#   cadence             -- scheduled-pull grammar: hourly|daily|weekly|<N>h|<N>d.
# Bare until the admin sets host + folders; the connector refuses to pull otherwise.
source:
  host:
  folders:
  since_days: 30
  max_files: 500
  default_sensitivity: confidential
  cadence: daily
