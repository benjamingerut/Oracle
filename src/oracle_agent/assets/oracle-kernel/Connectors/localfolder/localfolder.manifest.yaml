# localfolder -- the shipped read-only reference connector.
#
# Pulls files from ONE admin-approved local folder into Workproduct.nosync/_INPUT/
# non-destructively (copy + fsync + sha256-verify, source left intact), through
# safe_paths containment, the policy gate, and the intake sensitivity classifier.
# Runtime: _tools/connectors/localfolder.py (pull/probe/freshness/health).
#
# Block-style YAML only: one '- item' per line; no anchors, aliases, tags, flow
# ([] / {}), or multi-doc. Empty OPTIONAL fields are OMITTED (a bare 'key:' parses
# to null and the schema types these fields, so it would fail lint). Validated
# against _tools/schemas/connector.schema.json.

# id MUST match the folder name and the runtime's connector id.
id: localfolder

system: Local folder (admin-approved filesystem path)

# planned until the admin sets source.path below and approves the folder.
status: planned

# folder access mode: read a directory tree off the local filesystem.
access_mode: folder

# A point-in-time snapshot of selected bytes is copied into the oracle, then
# ingested; it is not kept continuously in sync (re-run pull to refresh).
locality: snapshot_local
capture_tier: snapshot

# No credentials: a local-folder read needs no secret. method 'none', no vars.
auth:
  method: none

# Read-only: the runtime refuses to run if this is read_write.
permissions: read_only

# Freshness SLA: a snapshot is considered stale after ~7 days; re-pull to refresh.
# last_verified is omitted until the first real pull populates it.
freshness:
  class: snapshot
  expected_decay_days: 7

# No fixed remote schema; the grain is "whatever files the admin drops in".
schema:
  key_objects:
    - file

# Source authority (feeds TRUTH-MAP.md): this connector is primary only for the
# documents the admin explicitly places in its source folder.
authoritative_for:
  - admin-supplied local documents
cannot_prove:
  - facts not present in the supplied files

# Guardrails.
forbidden_uses:
  - pulling from a path the admin has not explicitly approved
  - any write back to the source folder (read-only)
biases:
  - reflects only what the admin chose to place in the folder

# Health: confirm the configured source path exists and is a readable directory.
health_check:
  cadence: weekly
  checks:
    - source path is set
    - source path exists and is a readable directory
    - last pull within freshness SLA

# Local folders have no remote schema to re-probe.
schema_refresh:
  enabled: false
  remote_probe: false

# Runtime-specific block (read by _tools/connectors/localfolder.py; not part of
# the connector schema, which leaves unknown keys alone).
#   path                -- the folder to pull from. Bare (null) until the admin
#                          sets it; the connector refuses to pull on an empty path.
#   max_files           -- blast-radius cap per pull (also bounded by actions caps).
#   default_sensitivity -- intake label used when the classifier is uncertain.
source:
  path:
  max_files: 500
  default_sensitivity: internal
