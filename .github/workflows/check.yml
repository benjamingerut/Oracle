name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # ONLY pytest is installed: proves the kernel AND shell are stdlib-only.
      - run: python -m pip install pytest
      - run: make check

  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install from local dir and run doctor
        run: |
          sh installer/install.sh --from-dir "$PWD"
          ~/.local/bin/oracle version
